{% extends "base.html" %}

{% block title %}Asset Coverage — Admin{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Asset Coverage</h1>
        <a href="/admin/markets" class="d-none d-sm-inline-block btn btn-sm btn-secondary shadow-sm">
            <i class="fas fa-arrow-left fa-sm text-white-50"></i> Markets Section
        </a>
    </div>

    {% if saved %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        Asset coverage saved successfully.
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    {% endif %}

    <form method="post" action="/admin/markets/asset-coverage">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Coverage Intro</h6>
            </div>
            <div class="card-body">
                <div class="form-group mb-0">
                    <label for="intro">Markets &amp; Assets Covered</label>
                    <textarea class="form-control" id="intro" name="intro" rows="4" required>{{ intro }}</textarea>
                    <small class="form-text text-muted">Shown below the section title on the public markets section.</small>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary mb-4">
            <i class="fas fa-save fa-sm text-white-50"></i> Save Asset Coverage
        </button>
    </form>
</div>
{% endblock %}
