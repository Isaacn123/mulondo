{% extends "base.html" %}

{% block title %}{{ page_title }} — Admin{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">{{ page_title }}</h1>
        <a href="/admin/blog" class="d-none d-sm-inline-block btn btn-sm btn-secondary shadow-sm">
            <i class="fas fa-arrow-left fa-sm text-white-50"></i> Back to Blog
        </a>
    </div>

    {% if saved %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        Blog post saved successfully.
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    {% endif %}

    <form method="post" action="{% if is_new %}/admin/blog/new{% else %}/admin/blog/{{ post.slug }}{% endif %}">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Post Details</h6>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" class="form-control" id="title" name="title"
                        value="{{ post.title if post else '' }}" required>
                </div>
                <div class="form-group">
                    <label for="excerpt">Excerpt</label>
                    <textarea class="form-control" id="excerpt" name="excerpt" rows="2">{{ post.excerpt if post else '' }}</textarea>
                    <small class="form-text text-muted">Short summary shown in blog listings.</small>
                </div>
                <div class="form-group">
                    <label for="body">Body</label>
                    <textarea class="form-control" id="body" name="body" rows="12">{{ post.body if post else '' }}</textarea>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label for="author">Author</label>
                        <input type="text" class="form-control" id="author" name="author"
                            value="{{ post.author if post else 'Daniel Mulondo' }}" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label for="published_at">Published Date</label>
                        <input type="date" class="form-control" id="published_at" name="published_at"
                            value="{{ post.published_at if post else '' }}">
                    </div>
                    <div class="form-group col-md-4">
                        <label for="status">Status</label>
                        <select class="form-control" id="status" name="status" required>
                            <option value="draft" {% if post and post.status == 'draft' %}selected{% elif not post %}selected{% endif %}>Draft</option>
                            <option value="published" {% if post and post.status == 'published' %}selected{% endif %}>Published</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary mb-4">
            <i class="fas fa-save fa-sm text-white-50"></i> {% if is_new %}Save Post{% else %}Save Post{% endif %}
        </button>
    </form>

    {% if not is_new and post %}
    <form method="post" action="/admin/blog/{{ post.slug }}/delete"
        onsubmit="return confirm('Delete this blog post?');">
        <button type="submit" class="btn btn-danger mb-4">
            <i class="fas fa-trash fa-sm text-white-50"></i> Delete Post
        </button>
    </form>
    {% endif %}
</div>
{% endblock %}
