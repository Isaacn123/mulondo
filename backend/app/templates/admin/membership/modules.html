{% extends "base.html" %}

{% block title %}Membership Modules — Admin{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Curriculum Modules</h1>
        <a href="/admin/membership" class="d-none d-sm-inline-block btn btn-sm btn-secondary shadow-sm">
            <i class="fas fa-arrow-left fa-sm text-white-50"></i> Back to Membership
        </a>
    </div>

    {% if saved %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        Modules saved successfully.
        <button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    </div>
    {% endif %}

    <form method="post" action="/admin/membership/modules">
        <div class="card shadow mb-4">
            <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary">Modules</h6></div>
            <div class="card-body">
                <p class="text-muted small">One module per line. Format: <code>Title|Description</code></p>
                <textarea class="form-control" name="modules" rows="14" required>{{ modules_text }}</textarea>
            </div>
        </div>
        <button type="submit" class="btn btn-primary mb-4"><i class="fas fa-save fa-sm text-white-50"></i> Save Modules</button>
    </form>
</div>
{% endblock %}
