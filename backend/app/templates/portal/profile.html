{% extends "portal/base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">My Profile</h1>
    <div class="card shadow mb-4">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-3">Name</dt><dd class="col-sm-9">{{ investor.full_name }}</dd>
                <dt class="col-sm-3">Email</dt><dd class="col-sm-9">{{ investor.email }}</dd>
                <dt class="col-sm-3">Username</dt><dd class="col-sm-9">{{ investor.username }}</dd>
                <dt class="col-sm-3">Account type</dt><dd class="col-sm-9">Investor / Member</dd>
            </dl>
        </div>
    </div>
</div>
{% endblock %}
