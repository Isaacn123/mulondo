services:
  mysql:
    image: mysql:8.4
    container_name: daniel_mulondo_mysql
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" && mysql -h 127.0.0.1 -P 3306 -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" -e 'SELECT 1' \"$$MYSQL_DATABASE\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - mulondo

  phpmyadmin:
    image: phpmyadmin:5
    container_name: daniel_mulondo_phpmyadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "${PHPMYADMIN_PORT}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mulondo

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daniel_mulondo_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend/app/data:/app/app/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mulondo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_PORT: ${BACKEND_PORT}
    container_name: daniel_mulondo_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./frontend/assets:/usr/share/nginx/html/assets:ro
    depends_on:
      - backend
    networks:
      - mulondo

networks:
  mulondo:
    name: daniel_mulondo_net

volumes:
  mysql_data:
